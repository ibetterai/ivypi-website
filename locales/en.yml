# ── About Us Page ──
about:
  title: "About Us - IvyPi Consulting"
  meta_description: "IvyPi College Consulting was founded after both Chen's sons were admitted into the Massachusetts Institute of Technology."
  founder_name: "Selena Chen"
  founder_img_alt: "Selena Chen"
  founder_subtitle: "Founder &amp; Lead Counselor At IvyPi"
  founder_credentials: "Master's Degree in Computer Science &amp; Education"
  tab_mission: "Mission"
  tab_vision: "Vision"
  tab_values: "Values"
  mission_text: "IvyPi College Consulting was founded after both Chen's sons were admitted into the Massachusetts Institute of Technology. She aims to help students from all backgrounds achieve the bountiful academic future they desire."
  vision_text: "We hope to leave a positive, lasting impact on the lives of each and every student, not only for their future endeavors but also their personal growth and intellectual development."
  values_text: "We seek to be as open-minded as possible about students' and parents' needs and wishes when considering students' future careers, whether they be academically or vocationally oriented."
  team_heading: "Our Team"
  team_text: "We work with a diverse group of professionals consisting of professors, coaches, and essay specialists. We also collaborate with students from MIT, Harvard, and other top-tier universities."
  faq_heading: "Commonly Asked Questions"
  faq_1_q: "What does a college consulting service offer?"
  faq_1_a: "A college consulting service provides personalized guidance throughout the college application process. This can include help with selecting suitable colleges, crafting and editing personal statements and essays, preparing for interviews, developing application strategies, and providing advice on extracurricular activities to enhance a student's application profile."
  faq_2_q: "How early should I start working with a college consultant?"
  faq_2_a: "Ideally, you should start working with a college consultant in/before your early years of high school. This allows ample time to develop a strong academic and extracurricular profile, prepare for standardized tests, and create a well-rounded college application. However, it's never too late to seek guidance, even if you're already in your senior year."
  faq_3_q: "Do college consultants guarantee admission to top universities?"
  faq_3_a: "No reputable college consultant can guarantee admission to any specific college or university. Admissions decisions are made by the institutions themselves and depend on a variety of factors. However, consultants can significantly improve your chances by helping you present your strongest possible application and ensuring you make informed choices."
  faq_4_q: "What should I look for when choosing a college consultant?"
  faq_4_a: "When choosing a college consultant, look for someone with a proven track record of success, excellent reviews or testimonials, and relevant experience in college admissions. It's also important to find a consultant who understands your specific needs and goals and with whom you feel comfortable working. Schedule a consultation with us to see if we're the right fit for you!"
  faq_5_q: "Are college consulting services worth the investment?"
  faq_5_a: "For many families, college consulting services are worth the investment because they provide expert guidance, reduce stress, and increase the chances of admission to desired colleges. Consultants can offer personalized advice that goes beyond what school counselors can provide, especially in competitive college admissions."
  cta_text: "Read more about our personalized college consulting, college application, and middle/high school application services."
  cta_button: "Discover Now"
  # JSON-LD
  jsonld_page_name: "About Us - IvyPi Consulting"
  jsonld_breadcrumb_about: "About Us"

