# ── College Application Page ──
college_application:
  title: "College Application - IvyPi Consulting"
  meta_description: "IvyPi Consulting offers professional college consulting services to help students achieve college application success."
  hero_heading: "100% Acceptance into Top 30 Universities"
  hero_text: "With 30x more 1-on-1 consulting time than the average high school counselor."
  hero_cta: "Let's Help You Find College Success"
  hero_img_alt: "Students getting college application help"
  results_heading: "Proven Admissions Results:"
  results_subheading: "Universities Our Students Have Been Accepted To"
  intro_heading: "We provide expert college application guidance"
  intro_text: "IvyPi ensures a more efficient college application process and a much greater chance at striking the college jackpot. We guarantee that we'll do whatever we can to aid you in your admissions process, and here is a quick preview of the great resources we can provide:"
  choosing_title: "Choosing A College"
  choosing_text: "Deciding which college to attend is one of the most significant choices students and their families will make. The right college fit can profoundly impact a student's academic journey, personal growth, and future career prospects."
  choosing_tip: "Finding the right college for you is the first step to success in your future career."
  essays_title: "Personal Statements / College Essays"
  essays_text: "Personal statements and college essays are crucial components of the college application process. They offer students a unique opportunity to showcase their personality, experiences, and aspirations beyond what grades and test scores can convey."
  essays_tip: "When well-crafted, they provide admissions committees with a deeper understanding of who you are beyond grades and test scores."
  documents_title: "Application Documents"
  documents_text: "Preparing thorough application documents is crucial for college admissions success. This involves carefully completing each section of the application with accurate and detailed information."
  documents_tip: "Being well-organized and thorough in preparing application documents demonstrates responsibility and attention to detail."
  recommendation_title: "Letter of Recommendation"
  recommendation_text: "A letter of recommendation is a crucial element of the college application. It provides admissions officers with insights into your character, work ethic, and accomplishments from a third-party perspective."
  recommendation_tip: "Choosing the right recommenders can make a significant difference in the strength of your application."
  interview_title: "Interview Preparation"
  interview_text: "Interview preparation is an important step in the college application process. Many selective colleges and universities offer or require interviews as part of their admissions process."
  interview_tip: "Taking the time to prepare for college interviews demonstrates your commitment and can leave a lasting impression on admissions officers."
  strategic_title: "Strategic Planning"
  strategic_text: "Strategic planning in the context of college applications involves a thoughtful approach to maximizing your chances of admission. It includes building a balanced college list, managing timelines, and aligning your application with your academic and personal strengths."
  strategic_tip: "A strategic approach to college applications can significantly improve your chances of being admitted."
  resume_title: "Resume Building"
  resume_text: "Resume building, also known as creating an activities resume, is an important part of the college application process. It provides a comprehensive snapshot of your extracurricular involvement, leadership, and accomplishments."
  resume_tip: "A well-crafted activities resume provides admissions officers a quick overview of your extracurricular involvement."
  pricing_heading: "For Applying High School Students"
  pricing_text: "We offer bi-weekly private classes and small group classes (both 1.5 hours) to guide you in the application of the UCs and 10 other U.S. universities.&lt;br&gt;&lt;span class=&quot;italic&quot;&gt;*We welcome international students as well!&lt;/span&gt;"
  cta_heading: "Curious about how to craft an outstanding college application?"
  cta_text: "Check out our helpful informational seminars, where we answer your questions regarding a wide variety of topics regarding college application."
  cta_link_text: "Sign Up Now"
  # JSON-LD
  jsonld_page_name: "College Application - IvyPi Consulting"
  jsonld_breadcrumb: "College Application"

