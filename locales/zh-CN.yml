# ── About Us Page ──
about:
  title: "关于我们 - IvyPi Consulting"
  meta_description: "IvyPi 大学申请咨询创立于陈女士（Chen）的两个儿子均被麻省理工学院录取之后。"
  founder_name: "Selena Chen（陈）"
  founder_img_alt: "Selena Chen（陈）"
  founder_subtitle: "IvyPi 创始人 &amp; 首席顾问"
  founder_credentials: "计算机科学与教育学硕士学位"
  tab_mission: "使命"
  tab_vision: "愿景"
  tab_values: "价值观"
  mission_text: "IvyPi 大学申请咨询创立于陈女士（Chen）的两个儿子均被麻省理工学院录取之后。她致力于帮助来自各种背景的学生实现他们所渴望的丰硕学术未来。"
  vision_text: "我们希望对每位学生的生命留下积极而深远的影响，不仅着眼于他们未来的发展，也关注其个人成长与智识培养。"
  values_text: "在考量学生未来职业发展时，无论是以学术为导向还是以职业技能为导向，我们都力求充分尊重并开放地回应学生和家长的需求与愿望。"
  team_heading: "我们的团队"
  team_text: "我们与一支由教授、教练和文书专家组成的多元化专业团队合作，同时与来自 MIT、Harvard 及其他顶尖大学的学生携手共事。"
  faq_heading: "常见问题解答"
  faq_1_q: "大学申请咨询服务提供哪些帮助？"
  faq_1_a: "大学申请咨询服务在整个大学申请过程中提供个性化指导。这包括协助选择合适的大学、撰写和修改个人陈述及文书、准备面试、制定申请策略，以及就课外活动提供建议以提升学生的申请竞争力。"
  faq_2_q: "我应该多早开始与大学顾问合作？"
  faq_2_a: "理想情况下，您应该在高中早期或更早时开始与大学顾问合作。这样可以留有充足的时间建立扎实的学术和课外活动档案、备战标准化考试，并完善大学申请材料。当然，寻求指导永远不嫌晚，即便您已经是高中毕业班的学生也不例外。"
  faq_3_q: "大学顾问能保证进入顶尖大学吗？"
  faq_3_a: "任何信誉良好的大学顾问都无法保证被某所特定大学录取。录取决定由各院校自主做出，取决于多种因素。然而，顾问可以帮助您呈现最强申请材料并做出明智的选择，从而显著提升您的录取机会。"
  faq_4_q: "选择大学顾问时应注意哪些方面？"
  faq_4_a: "在选择大学顾问时，请寻找有成功案例、良好口碑或学生评价，以及丰富大学录取经验的顾问。同样重要的是，找到一位了解您具体需求和目标、让您感到舒适的顾问。欢迎预约咨询，看看我们是否适合您！"
  faq_5_q: "大学申请咨询服务值得投资吗？"
  faq_5_a: "对许多家庭而言，大学申请咨询服务物有所值，因为它提供专业指导、减轻压力，并提高被理想大学录取的机会。顾问能够提供超越学校辅导员所能给予的个性化建议，在竞争激烈的大学录取环境中尤为如此。"
  cta_text: "进一步了解我们的个性化大学申请咨询、大学申请及初/高中申请服务。"
  cta_button: "立即探索"
