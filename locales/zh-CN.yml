# ── College Application Page ──
college_application:
  title: "大学申请 - IvyPi Consulting"
  meta_description: "IvyPi Consulting 提供专业的大学申请咨询服务，助力学生在大学申请中取得成功。"
  hero_heading: "全美前30大学录取率100%"
  hero_text: "一对一咨询时间是普通高中辅导员的30倍。"
  hero_cta: "让我们助您叩开理想大学的大门"
  hero_img_alt: "学生获得大学申请帮助"
  results_heading: "卓越录取成果："
  results_subheading: "我们的学生已被录取的大学"
  intro_heading: "我们提供专业的大学申请指导"
  intro_text: "IvyPi 确保更高效的大学申请流程，大幅提升您赢得理想大学录取的机会。我们承诺竭尽所能协助您完成申请，以下是我们可提供的优质资源概览："
  choosing_title: "选择大学"
  choosing_text: "选择就读哪所大学，是学生和家庭将要做出的最重要决定之一。合适的大学能够深远影响学生的学术旅程、个人成长以及未来的职业发展。"
  choosing_tip: "找到适合您的大学，是开启未来职业成功的第一步。"
  essays_title: "个人陈述 / 大学文书"
  essays_text: "个人陈述和大学文书是大学申请过程中的关键组成部分。它们为学生提供了独特的机会，在成绩和考试分数之外展示个性、经历和人生志向。"
  essays_tip: "精心撰写的文书，能让招生委员会在成绩和考试分数之外更深入地了解您这个人。"
  documents_title: "申请材料"
  documents_text: "准备完整的申请材料对大学录取成功至关重要。这包括仔细填写申请表的每一个部分，确保信息准确详尽。"
  documents_tip: "有条理、认真细致地准备申请材料，体现了您的责任心和注重细节的态度。"
  recommendation_title: "推荐信"
  recommendation_text: "推荐信是大学申请的重要组成部分。它从第三方视角为招生官提供了对您的品格、职业素养和成就的深入了解。"
  recommendation_tip: "选择合适的推荐人，能够显著增强您申请材料的说服力。"
  interview_title: "面试准备"
  interview_text: "面试准备是大学申请过程中的重要环节。许多竞争激烈的大学将面试作为录取流程的一部分，或设为必要环节。"
  interview_tip: "认真准备大学面试，展示您的投入与热忱，能给招生官留下深刻而持久的印象。"
  strategic_title: "战略规划"
  strategic_text: "大学申请中的战略规划，是指以深思熟虑的方式最大化您的录取机会。这包括建立均衡的选校名单、合理安排时间线，以及将申请材料与您的学术和个人优势有机结合。"
  strategic_tip: "对大学申请采取战略性方法，可以显著提高您的录取机会。"
  resume_title: "简历撰写"
  resume_text: "简历撰写（也称为活动简历制作）是大学申请过程中的重要一环。它全面呈现您在课外活动、领导力和个人成就方面的参与情况。"
  resume_tip: "一份精心撰写的活动简历，让招生官能够快速全面地了解您的课外活动参与情况。"
  pricing_heading: "面向正在申请大学的高中生"
  pricing_text: "我们提供每两周一次的私教课和小组课（均为1.5小时），指导您申请UC系列及其他10所美国大学。&lt;br&gt;&lt;span class=&quot;italic&quot;&gt;*我们同样欢迎国际学生！&lt;/span&gt;"
  cta_heading: "想了解如何写出一份出色的大学申请材料吗？"
  cta_text: "欢迎参加我们的信息讲座，我们将解答您关于大学申请各类话题的疑问。"
  cta_link_text: "立即报名"
  # JSON-LD
  jsonld_page_name: "大学申请 - IvyPi Consulting"
  jsonld_breadcrumb: "大学申请"

