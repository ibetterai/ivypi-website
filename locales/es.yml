# ── College Application Page ──
college_application:
  title: "Aplicación Universitaria - IvyPi Consulting"
  meta_description: "IvyPi Consulting ofrece servicios profesionales de consultoría universitaria para ayudar a los estudiantes a tener éxito en su aplicación universitaria."
  hero_heading: "100% de Aceptación en las Mejores 30 Universidades"
  hero_text: "Con 30 veces más tiempo de consultoría individual que el consejero escolar promedio."
  hero_cta: "Te Ayudamos a Encontrar el Éxito Universitario"
  hero_img_alt: "Estudiantes recibiendo ayuda con la aplicación universitaria"
  results_heading: "Resultados de Admisión Comprobados:"
  results_subheading: "Universidades en las que Han Sido Aceptados Nuestros Estudiantes"
  intro_heading: "Ofrecemos orientación experta para la aplicación universitaria"
  intro_text: "IvyPi garantiza un proceso de aplicación universitaria más eficiente y una probabilidad mucho mayor de lograr la admisión soñada. Nos comprometemos a hacer todo lo posible para apoyarte en tu proceso de admisión, y aquí tienes un adelanto de los excelentes recursos que podemos ofrecerte:"
  choosing_title: "Elegir una Universidad"
  choosing_text: "Decidir a qué universidad asistir es una de las elecciones más importantes que los estudiantes y sus familias tomarán. La universidad adecuada puede tener un impacto profundo en el recorrido académico, el crecimiento personal y las perspectivas profesionales futuras del estudiante."
  choosing_tip: "Encontrar la universidad adecuada para ti es el primer paso hacia el éxito en tu futura carrera."
  essays_title: "Ensayos Personales / Ensayos Universitarios"
  essays_text: "Los ensayos personales y universitarios son componentes fundamentales del proceso de aplicación. Ofrecen a los estudiantes una oportunidad única de mostrar su personalidad, experiencias y aspiraciones más allá de lo que las calificaciones y puntajes de exámenes pueden transmitir."
  essays_tip: "Cuando están bien elaborados, brindan a los comités de admisión una comprensión más profunda de quién eres, más allá de las calificaciones y puntajes."
  documents_title: "Documentos de Solicitud"
  documents_text: "Preparar documentos de solicitud completos es fundamental para el éxito en la admisión universitaria. Esto implica completar cuidadosamente cada sección de la solicitud con información precisa y detallada."
  documents_tip: "Estar bien organizado y ser minucioso en la preparación de los documentos de solicitud demuestra responsabilidad y atención al detalle."
  recommendation_title: "Carta de Recomendación"
  recommendation_text: "Una carta de recomendación es un elemento crucial de la solicitud universitaria. Proporciona a los oficiales de admisiones información sobre tu carácter, ética de trabajo y logros desde la perspectiva de un tercero."
  recommendation_tip: "Elegir a los recomendadores adecuados puede marcar una diferencia significativa en la solidez de tu solicitud."
  interview_title: "Preparación para Entrevistas"
  interview_text: "La preparación para entrevistas es un paso importante en el proceso de aplicación universitaria. Muchas universidades selectivas ofrecen o requieren entrevistas como parte de su proceso de admisión."
  interview_tip: "Tomarte el tiempo para prepararte para las entrevistas universitarias demuestra tu compromiso y puede dejar una impresión duradera en los oficiales de admisiones."
  strategic_title: "Planificación Estratégica"
  strategic_text: "La planificación estratégica en el contexto de las aplicaciones universitarias implica un enfoque reflexivo para maximizar tus posibilidades de admisión. Incluye crear una lista equilibrada de universidades, gestionar los plazos y alinear tu solicitud con tus fortalezas académicas y personales."
  strategic_tip: "Un enfoque estratégico para las solicitudes universitarias puede mejorar significativamente tus probabilidades de ser admitido."
  resume_title: "Elaboración de Currículum"
  resume_text: "La elaboración del currículum, también conocida como creación de un resumen de actividades, es una parte importante del proceso de solicitud universitaria. Proporciona una instantánea integral de tu participación extracurricular, liderazgo y logros."
  resume_tip: "Un currículum de actividades bien elaborado brinda a los oficiales de admisiones una visión rápida de tu participación extracurricular."
  pricing_heading: "Para Estudiantes de Preparatoria en Proceso de Aplicación"
  pricing_text: "Ofrecemos clases privadas y en grupos pequeños cada dos semanas (ambas de 1.5 horas) para guiarte en la solicitud a las UC y otras 10 universidades estadounidenses.&lt;br&gt;&lt;span class=&quot;italic&quot;&gt;*¡También damos la bienvenida a estudiantes internacionales!&lt;/span&gt;"
  cta_heading: "¿Tienes curiosidad sobre cómo elaborar una solicitud universitaria sobresaliente?"
  cta_text: "Consulta nuestros seminarios informativos, donde respondemos tus preguntas sobre una amplia variedad de temas relacionados con la aplicación universitaria."
  cta_link_text: "Regístrate Ahora"
  # JSON-LD
  jsonld_page_name: "Aplicación Universitaria - IvyPi Consulting"
  jsonld_breadcrumb: "Aplicación Universitaria"

