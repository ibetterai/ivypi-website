  testimonial_3_school: "Stanford University"
  testimonial_4_text: "Tuve una experiencia realmente increíble trabajando con ellos. Su equipo me ayudó a clarificar mis caminos y me guió en la construcción de un plan personalizado para alcanzar mis metas. El enfoque estructurado con pasos claros y concretos hizo que este proceso tan estresante se sintiera manejable. Nada fue genérico; todo estuvo orientado a mis necesidades. Más allá de las solicitudes en sí, este proceso me permitió reflexionar sobre mis propias fortalezas y áreas de mejora. Estoy genuinamente agradecida por su apoyo."
