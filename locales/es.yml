# ── About Us Page ──
about:
  title: "Quiénes Somos - IvyPi Consulting"
  meta_description: "IvyPi College Consulting fue fundada después de que ambos hijos de Chen fueran admitidos en el Instituto Tecnológico de Massachusetts."
  founder_name: "Selena Chen"
  founder_img_alt: "Selena Chen"
  founder_subtitle: "Fundadora &amp; Consejera Principal en IvyPi"
  founder_credentials: "Maestría en Ciencias de la Computación &amp; Educación"
  tab_mission: "Misión"
  tab_vision: "Visión"
  tab_values: "Valores"
  mission_text: "IvyPi College Consulting fue fundada después de que ambos hijos de Chen fueran admitidos en el Instituto Tecnológico de Massachusetts. Su objetivo es ayudar a estudiantes de todos los orígenes a alcanzar el próspero futuro académico que desean."
  vision_text: "Esperamos dejar un impacto positivo y duradero en la vida de cada estudiante, no solo para sus futuros proyectos, sino también para su crecimiento personal y desarrollo intelectual."
  values_text: "Buscamos ser lo más abiertos de mente posible respecto a las necesidades y deseos de los estudiantes y padres al considerar las carreras futuras de los estudiantes, ya sean de orientación académica o vocacional."
  team_heading: "Nuestro Equipo"
  team_text: "Trabajamos con un grupo diverso de profesionales que incluye profesores, entrenadores y especialistas en ensayos. También colaboramos con estudiantes del MIT, Harvard y otras universidades de primer nivel."
  faq_heading: "Preguntas Frecuentes"
  faq_1_q: "¿Qué ofrece un servicio de consultoría universitaria?"
  faq_1_a: "Un servicio de consultoría universitaria brinda orientación personalizada a lo largo del proceso de solicitud universitaria. Esto puede incluir ayuda para seleccionar universidades adecuadas, redactar y editar ensayos personales, prepararse para entrevistas, desarrollar estrategias de solicitud y asesorar sobre actividades extracurriculares para fortalecer el perfil del estudiante."
  faq_2_q: "¿Con cuánta anticipación debería comenzar a trabajar con un consultor universitario?"
  faq_2_a: "Idealmente, deberías comenzar a trabajar con un consultor universitario durante o antes de los primeros años de preparatoria. Esto permite tiempo suficiente para desarrollar un perfil académico y extracurricular sólido, prepararse para los exámenes estandarizados y crear una solicitud universitaria integral. Sin embargo, nunca es tarde para buscar orientación, incluso si ya estás en tu último año."
  faq_3_q: "¿Los consultores universitarios garantizan la admisión a las mejores universidades?"
  faq_3_a: "Ningún consultor universitario de reputación puede garantizar la admisión a ninguna universidad específica. Las decisiones de admisión las toman las propias instituciones y dependen de una variedad de factores. Sin embargo, los consultores pueden mejorar significativamente tus posibilidades ayudándote a presentar la solicitud más sólida posible y asegurándose de que tomes decisiones informadas."
  faq_4_q: "¿Qué debo buscar al elegir un consultor universitario?"
  faq_4_a: "Al elegir un consultor universitario, busca a alguien con un historial comprobado de éxito, excelentes reseñas o testimonios y experiencia relevante en admisiones universitarias. También es importante encontrar a un consultor que comprenda tus necesidades y metas específicas y con quien te sientas cómodo trabajando. ¡Agenda una consulta con nosotros para ver si somos la opción adecuada para ti!"
  faq_5_q: "¿Valen la pena los servicios de consultoría universitaria?"
  faq_5_a: "Para muchas familias, los servicios de consultoría universitaria valen la inversión porque brindan orientación experta, reducen el estrés y aumentan las posibilidades de admisión en las universidades deseadas. Los consultores pueden ofrecer asesoramiento personalizado que va más allá de lo que los consejeros escolares pueden proporcionar, especialmente en admisiones universitarias competitivas."
  cta_text: "Lee más sobre nuestra consultoría universitaria personalizada, aplicación universitaria y servicios de solicitud para secundaria y preparatoria."
  cta_button: "Descubrir Ahora"
