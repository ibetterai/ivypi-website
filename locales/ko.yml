# ── About Us Page ──
about:
  title: "회사 소개 - IvyPi Consulting"
  meta_description: "IvyPi 대학 컨설팅은 Chen의 두 아들이 매사추세츠 공과대학교에 합격한 후 설립되었습니다."
  founder_name: "Selena Chen"
  founder_img_alt: "Selena Chen"
  founder_subtitle: "IvyPi 창립자 &amp; 수석 상담사"
  founder_credentials: "컴퓨터 과학 &amp; 교육학 석사 학위"
  tab_mission: "미션"
  tab_vision: "비전"
  tab_values: "가치관"
  mission_text: "IvyPi 대학 컨설팅은 Chen의 두 아들이 매사추세츠 공과대학교에 합격한 후 설립되었습니다. 그녀는 다양한 배경을 가진 학생들이 원하는 풍요로운 학업 미래를 달성할 수 있도록 돕는 것을 목표로 합니다."
  vision_text: "우리는 각각의 모든 학생의 삶에 긍정적이고 지속적인 영향을 남기기를 희망하며, 이는 미래의 노력뿐만 아니라 개인적 성장과 지적 발전을 위해서도 마찬가지입니다."
  values_text: "우리는 학생들의 미래 진로, 학문적이든 직업적이든 간에, 학생과 학부모의 필요와 바람에 대해 최대한 열린 마음을 가지려고 노력합니다."
  team_heading: "우리 팀"
  team_text: "우리는 교수, 코치, 에세이 전문가로 구성된 다양한 전문가 그룹과 함께 일합니다. 또한 MIT, 하버드 및 기타 최고 명문 대학교 학생들과도 협력합니다."
  faq_heading: "자주 묻는 질문"
  faq_1_q: "대학 컨설팅 서비스는 무엇을 제공하나요?"
  faq_1_a: "대학 컨설팅 서비스는 대학 지원 과정 전반에 걸쳐 맞춤형 지도를 제공합니다. 여기에는 적합한 대학 선택, 자기소개서 및 에세이 작성 및 편집, 면접 준비, 지원 전략 개발, 학생의 지원서 프로필을 강화하기 위한 과외 활동 조언 등이 포함될 수 있습니다."
  faq_2_q: "대학 컨설턴트와는 언제부터 일하기 시작해야 하나요?"
  faq_2_a: "이상적으로는 고등학교 초기에 혹은 그 이전부터 대학 컨설턴트와 함께 일하기 시작해야 합니다. 이를 통해 강한 학업 및 과외 활동 프로필을 개발하고, 표준화 시험을 준비하며, 균형 잡힌 대학 지원서를 만들 충분한 시간을 확보할 수 있습니다. 하지만 이미 고3이 되었더라도 지도를 구하는 것은 결코 늦지 않습니다."
  faq_3_q: "대학 컨설턴트가 명문 대학 합격을 보장해 주나요?"
  faq_3_a: "어떤 명문 대학 컨설턴트도 특정 대학이나 대학교의 합격을 보장할 수 없습니다. 입학 결정은 해당 기관에서 내리며 다양한 요소에 따라 달라집니다. 하지만 컨설턴트는 가능한 한 최강의 지원서를 제출할 수 있도록 돕고 정보에 입각한 선택을 할 수 있도록 함으로써 합격 가능성을 크게 높여줄 수 있습니다."
  faq_4_q: "대학 컨설턴트를 선택할 때 무엇을 봐야 하나요?"
  faq_4_a: "대학 컨설턴트를 선택할 때는 검증된 성공 실적, 훌륭한 리뷰 또는 추천사, 그리고 대학 입시 관련 경험을 갖춘 사람을 찾으세요. 또한 여러분의 특정 필요와 목표를 이해하고 함께 편안하게 일할 수 있는 컨설턴트를 찾는 것도 중요합니다. 저희가 적합한지 확인하기 위해 상담을 예약해 보세요!"
  faq_5_q: "대학 컨설팅 서비스는 투자할 가치가 있나요?"
  faq_5_a: "많은 가족들에게 대학 컨설팅 서비스는 전문적인 지도를 제공하고, 스트레스를 줄이며, 원하는 대학에 합격할 가능성을 높여주기 때문에 투자할 가치가 있습니다. 컨설턴트는 특히 경쟁적인 대학 입시에서 학교 상담사가 제공할 수 있는 것 이상의 맞춤형 조언을 제공할 수 있습니다."
  cta_text: "맞춤형 대학 컨설팅, 대학 지원, 중·고등학교 지원 서비스에 대해 더 자세히 읽어보세요."
  cta_button: "지금 알아보기"
  # JSON-LD
  jsonld_page_name: "회사 소개 - IvyPi Consulting"
  jsonld_breadcrumb_about: "회사 소개"

