  why_2_text: "대학 지원은 쉽지 않습니다. 경험 많은 어드바이저와 함께 시간을 최대한 활용하세요."
  why_3_title: "검증된 결과"
  why_3_text: "상위 30위 대학교 100% 합격이라는 검증된 실적으로 성공을 향한 여정을 함께합니다."
  services_heading: "우리의 서비스"
  service_1_title: "대학 컨설팅"
  service_1_text: "학생들의 풍요로운 학업 여정을 보장하는 다단계 교육 로드맵을 경험해 보세요."
  service_1_img_alt: "대학 컨설팅 세션"
  service_2_title: "대학 지원"
  service_2_text: "전문적이고 다각적인 접근 방식으로 대학 입학 경쟁에서 합격 가능성을 높이세요."
  service_2_img_alt: "대학 지원 도움"
  service_3_title: "중·고등학교"
  service_3_text: "모든 지원 체크리스트에 대한 전문적인 조언으로 학업 여정의 시작을 앞당기세요."
  service_3_img_alt: "고등학교 교실"
  learn_more: "자세히 보기"
  testimonials_heading: "학생 후기"
  testimonials_subheading: "우리의 컨설팅 서비스를 직접 경험한 성공한 졸업생들의 이야기를 들어보세요."
  testimonial_1_text: "IvyPi는 불가능을 가능하게 만듭니다. 매우 성실하고 책임감 있게 도와주셨습니다. 대학 지원 과정에서 지원할 학교를 계획하는 데 도움을 주시고 에세이에 대한 귀중한 조언을 많이 해주셨습니다. 정말 믿을 수 있는 분들이며, 꿈의 학교에 합격할 수 있게 해주셨을 뿐만 아니라 저 자신도 크게 성장할 수 있었습니다."
  testimonial_1_name: "Amy Zhao"
  testimonial_1_school: "MIT"
  testimonial_2_text: "고등학교 2학년 때 IvyPi에 합류하여 Selena 선생님의 지도 아래 꿈의 대학에 성공적으로 합격했습니다! 선생님은 매우 격려적이고 경험이 풍부하시며, 대학 지원, 고등학교 학업, 과외 활동에 대한 폭넓은 지식을 갖고 계십니다. IvyPi에서 저는 개인적으로도 지적으로도 성장했습니다."
  testimonial_2_name: "Julia Shang"
  testimonial_2_school: "Cornell University"
  testimonial_3_text: "IvyPi는 대학 지원 과정에서 정말 많은 도움이 되었습니다! 훌륭한 조언과 피드백 덕분에 에세이를 빛나게 쓸 수 있었습니다. 대학에 관한 모든 질문에도 친절하게 답해주셨습니다. 앞으로도 IvyPi의 미래 학생들이 성공하는 이야기를 듣기를 기대합니다!!"
  testimonial_3_name: "Jennifer Espinoza"
  testimonial_3_school: "Stanford University"
  testimonial_4_text: "함께 일하면서 정말 놀라운 경험을 했습니다. 팀원들이 제 진로를 명확히 하는 데 도움을 주고, 목표를 달성하기 위한 맞춤형 계획을 세우도록 안내해 주었습니다. 명확하고 구체적인 단계를 통한 체계적인 접근 방식 덕분에 스트레스받던 과정이 관리 가능하게 느껴졌습니다. 획일적인 것은 없었고, 모든 것이 제 필요에 맞게 조정되었습니다. 지원 과정 외에도, 이 과정을 통해 저 자신의 강점과 개선해야 할 부분을 돌아볼 수 있었습니다. 진심으로 감사드립니다."
  testimonial_4_name: "Angela Cui"
  testimonial_4_school: "Cornell University"
  testimonial_5_text: "기억에 남는 경험들 -- 지난 몇 년간 많은 새로운 것들을 시도하도록 격려받고 많은 것을 배웠습니다. 세세하고 유연한 계획을 세우며 자주 만나 모든 것을 제때 따라가고 있는지 확인해 줍니다."
  testimonial_5_name: "Yuxuan Liu"
  testimonial_5_school: "UC Berkeley"
  prev_testimonial: "이전 후기"
  next_testimonial: "다음 후기"
  cta_heading: "여정을 시작할 준비가 되셨나요?"
  cta_text: "중학교부터 대학 입시까지, 학업 과정의 모든 단계를 학생과 가족이 함께 헤쳐나갈 수 있도록 돕습니다."
  cta_seminars: "세미나 둘러보기"
  cta_contact: "문의하기"
  # JSON-LD
  jsonld_page_name: "IvyPi Consulting - 대학 컨설팅 서비스"
  jsonld_page_description: "IvyPi Consulting은 학생들이 학업적 성공을 이룰 수 있도록 전문적인 대학 컨설팅 서비스를 제공합니다."
  jsonld_org_name: "IvyPi Consulting"
