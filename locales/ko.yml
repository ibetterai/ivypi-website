# ── College Application Page ──
college_application:
  title: "대학 지원 - IvyPi Consulting"
  meta_description: "IvyPi Consulting은 학생들이 대학 지원에 성공할 수 있도록 전문적인 대학 컨설팅 서비스를 제공합니다."
  hero_heading: "상위 30위 대학교 100% 합격"
  hero_text: "일반 고등학교 상담사보다 30배 많은 1대1 컨설팅 시간을 제공합니다."
  hero_cta: "함께 대학 입시 성공을 이루어 드립니다"
  hero_img_alt: "대학 지원 도움을 받는 학생들"
  results_heading: "검증된 입시 결과:"
  results_subheading: "우리 학생들이 합격한 대학교"
  intro_heading: "전문적인 대학 지원 지도를 제공합니다"
  intro_text: "IvyPi는 더욱 효율적인 대학 지원 과정과 합격 가능성을 크게 높여드립니다. 입시 과정에서 최선을 다해 도움을 드릴 것을 약속하며, 저희가 제공할 수 있는 훌륭한 자원들을 간략하게 소개합니다:"
  choosing_title: "대학 선택"
  choosing_text: "어떤 대학에 진학할지 결정하는 것은 학생과 가족이 내려야 할 가장 중요한 선택 중 하나입니다. 올바른 대학 선택은 학생의 학업 여정, 개인적 성장, 그리고 미래 진로에 큰 영향을 미칠 수 있습니다."
  choosing_tip: "나에게 맞는 대학을 찾는 것이 미래 진로 성공을 향한 첫 번째 단계입니다."
  essays_title: "자기소개서 / 대학 에세이"
  essays_text: "자기소개서와 대학 에세이는 대학 지원 과정의 핵심 요소입니다. 성적과 시험 점수만으로는 전달할 수 없는 학생의 개성, 경험, 그리고 열망을 보여줄 수 있는 독특한 기회를 제공합니다."
  essays_tip: "잘 작성된 에세이는 입학 심사위원들이 성적과 시험 점수 너머에서 여러분이 어떤 사람인지 더 깊이 이해할 수 있게 해줍니다."
  documents_title: "지원 서류"
  documents_text: "철저한 지원 서류 준비는 대학 입시 성공에 필수적입니다. 이는 각 지원 항목을 정확하고 세부적인 정보로 신중하게 작성하는 것을 포함합니다."
  documents_tip: "지원 서류를 잘 정리하고 철저하게 준비하는 것은 책임감과 세심한 주의력을 보여줍니다."
  recommendation_title: "추천서"
  recommendation_text: "추천서는 대학 지원의 중요한 요소입니다. 제3자의 관점에서 여러분의 성격, 직업 윤리, 성취에 대한 통찰을 입학 담당자에게 제공합니다."
  recommendation_tip: "적절한 추천인을 선택하는 것이 지원서의 강점에 큰 차이를 만들 수 있습니다."
  interview_title: "면접 준비"
  interview_text: "면접 준비는 대학 지원 과정에서 중요한 단계입니다. 많은 명문 대학들이 입학 과정의 일환으로 면접을 제공하거나 요구합니다."
  interview_tip: "대학 면접을 준비하는 시간을 갖는 것은 헌신감을 보여주며 입학 담당자에게 지속적인 인상을 남길 수 있습니다."
  strategic_title: "전략적 계획"
  strategic_text: "대학 지원에서의 전략적 계획은 합격 가능성을 극대화하기 위한 신중한 접근 방식을 포함합니다. 균형 잡힌 지원 대학 목록 작성, 일정 관리, 그리고 학업 및 개인적 강점에 지원서를 맞추는 것이 포함됩니다."
  strategic_tip: "대학 지원에 대한 전략적 접근은 합격 가능성을 크게 향상시킬 수 있습니다."
  resume_title: "이력서 작성"
  resume_text: "이력서 작성, 즉 활동 이력서 작성은 대학 지원 과정의 중요한 부분입니다. 과외 활동 참여, 리더십, 그리고 성취에 대한 포괄적인 스냅샷을 제공합니다."
  resume_tip: "잘 작성된 활동 이력서는 입학 담당자에게 과외 활동 참여에 대한 빠른 개요를 제공합니다."
