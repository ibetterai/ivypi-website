  trust_bar_heading: "우리 학생들이 합격한 대학교"
  why_heading: "왜 IvyPi인가요?"
  why_1_title: "맞춤형 전략"
  why_1_text: "모든 학생의 목표와 관심사는 다릅니다. 여러분에게 맞는 최적의 방향을 찾는 것이 중요합니다."
